<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A Declaration of Courses</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #efe2c8;
      --white: #fff8e8;
      --ink: #21180f;
      --muted: #6f604f;
      --rule: #9f8060;
      --red: #9f2e2e;
      --red-soft: #f3d9dd;
      --blue: #20385d;
      --blue-soft: #dce6f4;
      --gold: #b48a3a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 255, 255, 0.25), transparent 26%),
        radial-gradient(circle at 82% 30%, rgba(112, 80, 45, 0.12), transparent 28%),
        repeating-linear-gradient(0deg, rgba(33, 24, 15, 0.025) 0 1px, transparent 1px 5px),
        var(--paper);
      color: var(--ink);
      font-family: "Georgia", "Times New Roman", serif;
      line-height: 1.45;
    }

    .page {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .menu {
      position: relative;
      padding: clamp(32px, 6vw, 68px);
      border: 1px solid rgba(33, 24, 15, 0.34);
      background:
        linear-gradient(180deg, rgba(255, 248, 232, 0.96), rgba(255, 248, 232, 0.89)),
        var(--white);
      box-shadow: 0 24px 70px rgba(33, 24, 15, 0.18);
    }

    .menu::before,
    .menu::after {
      content: "";
      position: absolute;
      pointer-events: none;
      inset: 14px;
      border: 2px solid rgba(159, 46, 46, 0.44);
    }

    .menu::after {
      inset: 22px;
      border: 1px solid rgba(33, 24, 15, 0.28);
    }

    header,
    section,
    footer {
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 44px;
    }

    .official-header {
      margin: calc(clamp(32px, 6vw, 68px) * -1) calc(clamp(32px, 6vw, 68px) * -1) 28px;
      border-bottom: 3px double var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 248, 232, 0.98), rgba(239, 226, 200, 0.74));
      color: var(--ink);
      text-align: center;
    }

    .official-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: clamp(12px, 3vw, 18px) clamp(22px, 5vw, 44px);
    }

    .official-wordmark {
      min-width: 0;
    }

    .agency {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: clamp(0.78rem, 2vw, 0.98rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .office {
      margin: 3px 0 0;
      color: var(--red);
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.64rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .flag-mark {
      flex: 0 0 auto;
      width: 92px;
      height: 58px;
      border: 2px solid var(--ink);
      background: var(--white);
      box-shadow: 4px 4px 0 rgba(33, 24, 15, 0.14);
    }

    .flag-mark svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--red);
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .title-block {
      padding: 0 clamp(10px, 3vw, 24px);
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2.3rem, 6vw, 4.7rem);
      font-weight: 400;
      line-height: 0.95;
    }

    .h1-accent {
      display: block;
      color: var(--red);
      font-size: 0.42em;
      font-style: italic;
    }

    .subtitle {
      max-width: 560px;
      margin: 14px auto 0;
      color: var(--muted);
      font-size: clamp(0.94rem, 2.1vw, 1.04rem);
      font-style: italic;
    }

    .tricolor {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      width: min(220px, 60%);
      height: 3px;
      margin: 18px auto 0;
      background: var(--rule);
    }

    .tricolor span:nth-child(1) {
      background: var(--red);
    }

    .tricolor span:nth-child(2) {
      background: var(--white);
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    .tricolor span:nth-child(3) {
      background: var(--blue);
    }

    .course {
      display: grid;
      grid-template-columns: minmax(110px, 170px) 1fr;
      gap: clamp(18px, 4vw, 42px);
      padding: 30px 0;
      border-top: 1px solid rgba(23, 59, 112, 0.22);
    }

    .course:first-of-type {
      border-top: 0;
    }

    .course-title {
      margin: 3px 0 0;
      color: var(--blue);
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .item {
      margin-bottom: 26px;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      display: block;
      width: 100%;
    }

    .item:last-child {
      margin-bottom: 0;
    }

    .item:focus-visible,
    .footer-button:focus-visible,
    .modal button:focus-visible {
      outline: 2px solid var(--red);
      outline-offset: 6px;
    }

    .item:hover h2,
    .item:focus-visible h2 {
      color: var(--red);
    }

    h2 {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin: 0 0 6px;
      color: #171b25;
      font-size: clamp(1.34rem, 3vw, 2rem);
      font-weight: 400;
      line-height: 1.08;
    }

    h2::after {
      content: "";
      height: 1px;
      flex: 1;
      min-width: 32px;
      background: linear-gradient(90deg, rgba(201, 188, 169, 0.86), transparent);
    }

    .description {
      margin: 0;
      max-width: 620px;
      color: #3f3a34;
      font-size: clamp(1rem, 2.2vw, 1.1rem);
    }

    .detail {
      margin: 8px 0 0;
      color: var(--muted);
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    footer {
      margin-top: 36px;
      padding-top: 26px;
      border-top: 1px solid rgba(23, 59, 112, 0.22);
      color: var(--blue);
      text-align: center;
      font-size: 0.98rem;
      font-style: italic;
    }

    .footer-button {
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
      font-style: inherit;
    }

    .modal {
      border: 0;
      width: min(560px, calc(100% - 32px));
      padding: 0;
      background: transparent;
      color: var(--ink);
    }

    .modal::backdrop {
      background: rgba(21, 25, 35, 0.44);
      backdrop-filter: blur(3px);
    }

    .modal-card {
      position: relative;
      padding: clamp(28px, 6vw, 44px);
      border: 1px solid rgba(23, 59, 112, 0.34);
      background: var(--white);
      box-shadow: 0 24px 80px rgba(21, 25, 35, 0.26);
      text-align: center;
    }

    .modal-card::before {
      content: "";
      position: absolute;
      inset: 12px;
      pointer-events: none;
      border: 1px solid rgba(163, 38, 53, 0.46);
    }

    .modal-kicker {
      margin: 0 0 12px;
      color: var(--red);
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .modal h2 {
      display: block;
      margin: 0 0 14px;
      color: var(--blue);
      font-size: clamp(1.8rem, 7vw, 3.1rem);
      line-height: 1;
      text-align: center;
    }

    .modal h2::after {
      display: none;
    }

    .modal p {
      margin: 0 auto 18px;
      max-width: 430px;
      color: #3f3a34;
      font-size: 1.05rem;
    }

    .modal-detail {
      color: var(--muted);
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .modal-actions {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }

    .modal button {
      border: 1px solid var(--blue);
      padding: 10px 18px;
      background: var(--blue);
      color: var(--white);
      cursor: pointer;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .dish-popover {
      position: fixed;
      z-index: 25;
      width: min(360px, calc(100vw - 32px));
      border: 1px solid rgba(23, 59, 112, 0.22);
      padding: 16px 18px 15px;
      background: #ffffff;
      box-shadow: 0 16px 38px rgba(21, 25, 35, 0.18);
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity 150ms ease, transform 150ms ease;
    }

    .dish-popover.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .dish-popover::before {
      content: "";
      position: absolute;
      top: -8px;
      left: 28px;
      width: 14px;
      height: 14px;
      border-top: 1px solid rgba(23, 59, 112, 0.22);
      border-left: 1px solid rgba(23, 59, 112, 0.22);
      background: #ffffff;
      transform: rotate(45deg);
    }

    .dish-popover h3 {
      margin: 0 28px 7px 0;
      color: var(--blue);
      font-size: 1.18rem;
      font-weight: 400;
      line-height: 1.1;
    }

    .dish-popover p {
      margin: 0 0 10px;
      color: #3f3a34;
      font-size: 0.95rem;
    }

    .dish-popover .popover-note {
      margin: 0;
      color: var(--muted);
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .popover-close {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 0;
      width: 28px;
      height: 28px;
      background: transparent;
      color: var(--red);
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
    }

    .signature-pad {
      margin: 34px auto 0;
      max-width: 520px;
      padding-top: 22px;
      border-top: 1px solid rgba(23, 59, 112, 0.18);
      text-align: center;
    }

    .signature-pad label {
      display: block;
      margin-bottom: 10px;
      color: var(--blue);
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .signature-canvas {
      display: block;
      width: 100%;
      height: 120px;
      border: 1px solid rgba(23, 59, 112, 0.28);
      background:
        linear-gradient(180deg, transparent 77%, rgba(163, 38, 53, 0.18) 78%, transparent 79%),
        rgba(255, 253, 248, 0.78);
      cursor: crosshair;
      touch-action: none;
    }

    .signature-tools {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .signature-tools button {
      border: 1px solid rgba(23, 59, 112, 0.38);
      padding: 7px 10px;
      background: transparent;
      color: var(--blue);
      cursor: pointer;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .confetti-piece {
      position: fixed;
      z-index: 30;
      width: 8px;
      height: 12px;
      pointer-events: none;
      animation: fall 900ms ease-out forwards;
    }

    @keyframes fall {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translate3d(var(--x), var(--y), 0) rotate(340deg);
        opacity: 0;
      }
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 20px, 960px);
        padding: 20px 0;
      }

      .menu {
        padding: 34px 24px;
      }

      .official-header {
        margin: -34px -24px 28px;
      }

      .official-bar {
        align-items: flex-start;
        gap: 10px;
        padding: 14px;
      }

      .flag-mark {
        width: 74px;
        height: 48px;
      }

      .menu::before,
      .menu::after {
        inset: 10px;
      }

      .course {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 24px 0;
      }

      h2 {
        display: block;
      }

      h2::after {
        display: none;
      }
    }

    @media print {
      body {
        background: var(--paper);
      }

      .page {
        width: 100%;
        padding: 0;
      }

      .menu {
        border: 0;
        box-shadow: none;
        padding: 36px;
      }

      .flag-mark {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <article class="menu" aria-labelledby="menu-title">
      <header>
        <div class="official-header">
          <div class="official-bar">
            <div class="flag-mark" aria-hidden="true">
              <svg viewBox="0 0 112 70" role="img">
                <rect width="112" height="70" fill="#fff8e8"/>
                <rect y="0" width="112" height="5.38" fill="#9f2e2e"/>
                <rect y="10.77" width="112" height="5.38" fill="#9f2e2e"/>
                <rect y="21.54" width="112" height="5.38" fill="#9f2e2e"/>
                <rect y="32.31" width="112" height="5.38" fill="#9f2e2e"/>
                <rect y="43.08" width="112" height="5.38" fill="#9f2e2e"/>
                <rect y="53.85" width="112" height="5.38" fill="#9f2e2e"/>
                <rect y="64.62" width="112" height="5.38" fill="#9f2e2e"/>
                <rect width="45" height="37.7" fill="#20385d"/>
                <g fill="#fff8e8">
                  <circle cx="22.5" cy="18.85" r="2"/>
                  <circle cx="22.5" cy="7.85" r="2"/>
                  <circle cx="27.8" cy="9.75" r="2"/>
                  <circle cx="31" cy="14.4" r="2"/>
                  <circle cx="31" cy="20.3" r="2"/>
                  <circle cx="27.8" cy="25" r="2"/>
                  <circle cx="22.5" cy="26.85" r="2"/>
                  <circle cx="17.2" cy="25" r="2"/>
                  <circle cx="14" cy="20.3" r="2"/>
                  <circle cx="14" cy="14.4" r="2"/>
                  <circle cx="17.2" cy="9.75" r="2"/>
                  <circle cx="36" cy="18.85" r="2"/>
                  <circle cx="9" cy="18.85" r="2"/>
                </g>
              </svg>
            </div>
            <div class="official-wordmark">
              <p class="agency">Printed by Order of the Committee of Taste</p>
              <p class="office">Issued for the Eve of 250</p>
            </div>
          </div>
        </div>
        <div class="title-block">
          <p class="eyebrow">Friday, July 3, 2026 at 6 PM | 260 W 54th St Apt 30D</p>
          <h1 id="menu-title">A Declaration <span class="h1-accent">of Courses</span></h1>
          <div class="tricolor" aria-hidden="true"><span></span><span></span><span></span></div>
        </div>
      </header>

      <section class="course" aria-labelledby="first-course">
        <p class="course-title" id="first-course">To Begin</p>
        <div>
          <button class="item" type="button" aria-haspopup="dialog" data-title="Chili Crisp Cucumbers" data-detail="Cold cucumbers tossed with rice vinegar, soy, sesame, chili crisp, scallions, and sesame seeds." data-note="Cool, sharp, and built for picking at between bites.">
            <h2>Chili Crisp Cucumbers</h2>
            <p class="description">Cold cucumbers with rice vinegar, soy, sesame, chili crisp, scallions, and sesame seeds.</p>
            <p class="detail">Cool heat and a bright first bite</p>
          </button>
          <button class="item" type="button" aria-haspopup="dialog" data-title="Smoked Whitefish Caesar" data-detail="Romaine, smoked whitefish, rye breadcrumbs, fried capers, Parmesan, and sharp smoky Caesar dressing." data-note="Contains fish, dairy, egg, and gluten.">
            <h2>Smoked Whitefish Caesar</h2>
            <p class="description">Crisp romaine, smoked whitefish, rye breadcrumbs, fried capers, sharp lemon dressing, and Parmesan.</p>
            <p class="detail">Rye crunch, fried capers, and Parmesan</p>
          </button>
          <button class="item" type="button" aria-haspopup="dialog" data-title="Watermelon Three Ways" data-detail="Vacuum-compressed watermelon in lime-salt, Aperol-lime, and gin-cucumber-mint, served with pickled rind, herbs, chile, and toasted seeds." data-note="A small bright side; one variation contains alcohol.">
            <h2>Watermelon Three Ways</h2>
            <p class="description">Vacuum-compressed watermelon in lime-salt, Aperol-lime, and gin-cucumber-mint, with pickled rind, herbs, and chile.</p>
            <p class="detail">A small bright side with toasted seed crunch</p>
          </button>
          <button class="item" type="button" aria-haspopup="dialog" data-title="HK-Style Potato Salad" data-detail="Creamy Hong Kong cafe-style potato salad with Kewpie mayo, eggs, cucumber, carrot, and a little condensed milk for sweetness." data-note="Best served cold or cool; contains egg.">
            <h2>HK-Style Potato Salad</h2>
            <p class="description">Creamy potato salad with Kewpie, eggs, cucumber, carrot, and a softly sweet cha chaan teng direction.</p>
            <p class="detail">Cool, creamy, and gently nostalgic</p>
          </button>
        </div>
      </section>

      <section class="course" aria-labelledby="main-course">
        <p class="course-title" id="main-course">Main Table</p>
        <div>
          <button class="item" type="button" aria-haspopup="dialog" data-title="Coca-Cola Braised Short Ribs" data-detail="The main anchor: cola-braised beef with tamarind, soy, ginger, garlic, black pepper, and a lime-bright finish." data-note="Prepared off-site.">
            <h2>Coca-Cola Braised Short Ribs</h2>
            <p class="description">Slow-braised beef with cola, tamarind, soy, ginger, garlic, black pepper, and a lime-bright finish.</p>
            <p class="detail">The main anchor, prepared off-site</p>
          </button>
          <button class="item" type="button" aria-haspopup="dialog" data-title="Buffalo Mac and Cheese" data-detail="Baked macaroni with Buffalo-tossed chicken, cheddar, Monterey Jack, Parmesan-panko crust, and fresh wing-style garnishes." data-note="Contains dairy, gluten, and chicken.">
            <h2>Buffalo Mac and Cheese</h2>
            <p class="description">Baked macaroni, Buffalo-tossed chicken, cheddar, Monterey Jack, and a Parmesan-panko crust.</p>
            <p class="detail">Scallions, celery leaves, and pickled celery</p>
          </button>
          <button class="item" type="button" aria-haspopup="dialog" data-title="Tomato Salad with Salted Egg Yolk Corn" data-detail="Ripe tomatoes dressed with lime, topped with charred corn in salted egg yolk, herbs, and a crunchy finish." data-note="Vegetarian and dairy-free; contains egg.">
            <h2>Tomato Salad with Salted Egg Yolk Corn</h2>
            <p class="description">Ripe tomatoes dressed with lime, topped with charred corn in salted egg yolk, herbs, and crunch.</p>
            <p class="detail">Vegetarian summer side</p>
          </button>
          <button class="item" type="button" aria-haspopup="dialog" data-title="Sheet-Pan Carrots" data-detail="Roasted carrots glazed with honey, Dijon, and a little vinegar or lemon, then finished with herbs." data-note="Served warm; sweet, sharp, and quietly sturdy.">
            <h2>Sheet-Pan Carrots</h2>
            <p class="description">Roasted carrots glazed with honey, Dijon, and a little vinegar or lemon, finished with herbs.</p>
            <p class="detail">A hot vegetable side with gloss and bite</p>
          </button>
        </div>
      </section>

      <section class="course" aria-labelledby="drinks-course">
        <p class="course-title" id="drinks-course">Drinks</p>
        <div>
          <button class="item" type="button" aria-haspopup="dialog" data-title="Agua Frescas" data-detail="Bright, cold drinks in hibiscus ginger, pineapple jalapeno, and cucumber mint." data-note="Lightly sweet, high acid, very cold.">
            <h2>Agua Frescas</h2>
            <p class="description">Hibiscus ginger, pineapple jalapeno, and cucumber mint, chilled without ice and poured over fresh cubes.</p>
            <p class="detail">Lightly sweet, high acid, very cold</p>
          </button>
        </div>
      </section>

      <section class="course" aria-labelledby="dessert-course">
        <p class="course-title" id="dessert-course">Dessert</p>
        <div>
          <button class="item" type="button" aria-haspopup="dialog" data-title="Vanilla Panna Cotta" data-detail="Silky vanilla cream with blueberry-lime compote and a whisper of black pepper." data-note="Contains dairy and gelatin.">
            <h2>Vanilla Panna Cotta</h2>
            <p class="description">Silky vanilla cream with blueberry-lime compote and a whisper of black pepper.</p>
            <p class="detail">Cold, clean, and quietly blue</p>
          </button>
        </div>
      </section>

      <footer>
        <button class="footer-button" type="button" id="confettiButton">Vaguely patriotic. Firmly delicious.</button>
        <div class="signature-pad" aria-label="Signature easter egg">
          <label for="signatureCanvas">Set down your John Hancock below</label>
          <canvas class="signature-canvas" id="signatureCanvas" width="720" height="180"></canvas>
          <div class="signature-tools">
            <button type="button" id="clearSignature">Clear</button>
            <button type="button" id="stampSignature">Ratify</button>
          </div>
        </div>
      </footer>
    </article>
  </main>

  <dialog class="modal" id="proclamationModal" aria-labelledby="proclamationTitle">
    <div class="modal-card">
      <p class="modal-kicker">Proclamation</p>
      <h2 id="proclamationTitle">Hear ye, eat ye.</h2>
      <p>A Declaration of Courses shall commence July 3 at 6 PM.</p>
      <div class="modal-actions">
        <button type="button" data-close-modal>Ratify the Menu</button>
      </div>
    </div>
  </dialog>

  <aside class="dish-popover" id="dishPopover" role="dialog" aria-live="polite" aria-labelledby="dishPopoverTitle">
    <button class="popover-close" type="button" aria-label="Close dish note" id="dishPopoverClose">&times;</button>
    <h3 id="dishPopoverTitle"></h3>
    <p id="dishPopoverDetail"></p>
    <p class="popover-note" id="dishPopoverNote"></p>
  </aside>

  <script>
    const proclamationModal = document.getElementById("proclamationModal");
    const dishPopover = document.getElementById("dishPopover");
    const dishPopoverTitle = document.getElementById("dishPopoverTitle");
    const dishPopoverDetail = document.getElementById("dishPopoverDetail");
    const dishPopoverNote = document.getElementById("dishPopoverNote");
    const dishPopoverClose = document.getElementById("dishPopoverClose");
    const confettiButton = document.getElementById("confettiButton");
    const signatureCanvas = document.getElementById("signatureCanvas");
    const clearSignature = document.getElementById("clearSignature");
    const stampSignature = document.getElementById("stampSignature");
    const signatureContext = signatureCanvas.getContext("2d");
    let isSigning = false;

    function openModal(modal) {
      if (typeof modal.showModal === "function") {
        modal.showModal();
      }
    }

    function closeModal(event) {
      const modal = event.target.closest("dialog");
      if (modal) modal.close();
    }

    document.querySelectorAll("[data-close-modal]").forEach((button) => {
      button.addEventListener("click", closeModal);
    });

    document.querySelectorAll(".modal").forEach((modal) => {
      modal.addEventListener("click", (event) => {
        if (event.target === modal) modal.close();
      });
    });

    document.querySelectorAll(".item").forEach((item) => {
      item.addEventListener("click", (event) => {
        const rect = item.getBoundingClientRect();
        const popoverWidth = Math.min(360, window.innerWidth - 32);
        const left = Math.min(Math.max(16, rect.left + 12), window.innerWidth - popoverWidth - 16);
        const top = Math.min(rect.bottom + 12, window.innerHeight - 190);

        dishPopoverTitle.textContent = item.dataset.title;
        dishPopoverDetail.textContent = item.dataset.detail;
        dishPopoverNote.textContent = item.dataset.note;
        dishPopover.style.left = `${left}px`;
        dishPopover.style.top = `${Math.max(16, top)}px`;
        dishPopover.classList.add("is-open");
        event.stopPropagation();
      });
    });

    dishPopoverClose.addEventListener("click", () => {
      dishPopover.classList.remove("is-open");
    });

    document.addEventListener("click", (event) => {
      if (!dishPopover.contains(event.target) && !event.target.closest(".item")) {
        dishPopover.classList.remove("is-open");
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        dishPopover.classList.remove("is-open");
      }
    });

    function burstConfetti(originX, originY) {
      const colors = ["#a32635", "#fffdf8", "#173b70", "#b48a3a"];
      for (let i = 0; i < 34; i += 1) {
        const piece = document.createElement("span");
        const angle = (Math.PI * 2 * i) / 34;
        const distance = 70 + Math.random() * 120;
        piece.className = "confetti-piece";
        piece.style.left = `${originX}px`;
        piece.style.top = `${originY}px`;
        piece.style.background = colors[i % colors.length];
        piece.style.setProperty("--x", `${Math.cos(angle) * distance}px`);
        piece.style.setProperty("--y", `${Math.sin(angle) * distance + 90}px`);
        document.body.appendChild(piece);
        piece.addEventListener("animationend", () => piece.remove());
      }
    }

    confettiButton.addEventListener("click", (event) => {
      const rect = event.currentTarget.getBoundingClientRect();
      burstConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
    });

    function prepareSignatureCanvas() {
      signatureContext.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height);
      signatureContext.lineWidth = 4;
      signatureContext.lineCap = "round";
      signatureContext.lineJoin = "round";
      signatureContext.strokeStyle = "#173b70";
    }

    function signaturePoint(event) {
      const rect = signatureCanvas.getBoundingClientRect();
      const source = event.touches ? event.touches[0] : event;
      return {
        x: ((source.clientX - rect.left) / rect.width) * signatureCanvas.width,
        y: ((source.clientY - rect.top) / rect.height) * signatureCanvas.height
      };
    }

    function startSignature(event) {
      event.preventDefault();
      isSigning = true;
      const point = signaturePoint(event);
      signatureContext.beginPath();
      signatureContext.moveTo(point.x, point.y);
    }

    function drawSignature(event) {
      if (!isSigning) return;
      event.preventDefault();
      const point = signaturePoint(event);
      signatureContext.lineTo(point.x, point.y);
      signatureContext.stroke();
    }

    function endSignature() {
      isSigning = false;
    }

    signatureCanvas.addEventListener("mousedown", startSignature);
    signatureCanvas.addEventListener("mousemove", drawSignature);
    window.addEventListener("mouseup", endSignature);
    signatureCanvas.addEventListener("touchstart", startSignature, { passive: false });
    signatureCanvas.addEventListener("touchmove", drawSignature, { passive: false });
    window.addEventListener("touchend", endSignature);

    clearSignature.addEventListener("click", prepareSignatureCanvas);

    stampSignature.addEventListener("click", () => {
      const rect = signatureCanvas.getBoundingClientRect();
      burstConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
    });

    window.addEventListener("DOMContentLoaded", () => {
      prepareSignatureCanvas();
      window.setTimeout(() => openModal(proclamationModal), 350);
    });
  </script>
</body>
</html>
